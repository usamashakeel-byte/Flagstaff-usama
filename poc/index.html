        <button class="sidebar__btn" data-nav="calendar" title="Calendar"><svg><use href="#i-cal"/></svg></button>
      </nav>
      <button class="sidebar__btn sidebar__settings" title="Settings"><svg><use href="#i-settings"/></svg></button>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Topbar -->
      <header class="topbar">
        <div class="crumbs" id="crumbs">
          <span>Home</span>
        </div>
        <div class="topbar__right">
          <button class="bell" aria-label="Notifications"><svg><use href="#i-bell"/></svg></button>
          <button class="profile-chip">
            <span class="profile-chip__avatar"></span>
            <span class="profile-chip__name">Abdullah</span>
            <svg><use href="#i-chevron-down"/></svg>
          </button>
        </div>
      </header>

      <!-- View 0: Pre-conversation splash (3 screens) -->
      <section class="view" id="view-splash">
        <div class="splash-atmosphere" aria-hidden="true">
          <div class="splash-atmosphere__blob splash-atmosphere__blob--a"></div>
          <div class="splash-atmosphere__blob splash-atmosphere__blob--b"></div>
          <div class="splash-atmosphere__blob splash-atmosphere__blob--c"></div>
        </div>
        <div class="splash">
          <div class="splash__shell">
            <!-- LEFT: text content + CTA. Content swaps in place between screens. -->
            <div class="splash__left">
              <div class="splash__left-stage" id="splash-left-stage"></div>
              <div class="splash__foot">
                <button class="splash__back" id="splash-back" type="button" aria-label="Back">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                  <span>Back</span>
                </button>
                <div class="splash__dots" id="splash-dots">
                  <span class="splash__dot splash__dot--active" data-idx="0"></span>
                  <span class="splash__dot" data-idx="1"></span>
                  <span class="splash__dot" data-idx="2"></span>
                </div>
                <button class="splash__cta" id="splash-cta" type="button">
                  <span class="splash__cta-label" id="splash-cta-label">Next</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
              </div>
            </div>
            <!-- RIGHT: persistent visual container; inner content swaps between screens. -->
            <div class="splash__right">
              <div class="splash__right-stage" id="splash-right-stage"></div>
            </div>
          </div>
          <button class="splash__skip" id="splash-skip" type="button">Skip</button>
          <div class="splash__brand" aria-label="Flagstaff Social">
            <span class="splash__brand-mark"><svg><use href="#i-logo"/></svg></span>
            <span class="splash__brand-name">Flagstaff</span>
          </div>
        </div>
      </section>

      <!-- View 1: Conversation (also owns the start/greeting hero) -->
      <section class="view view--active" id="view-conv">
        <div class="conv">
          <div class="conv__main">
            <div class="conv__stream" id="stream"></div>
            <div class="conv__composer">
              <div class="composer-pill">
                <button class="composer-pill__attach" aria-label="Attach"><svg><use href="#i-attach"/></svg></button>
                <input type="text" id="composer-input" placeholder="Message Scout…" />
                <button class="composer-pill__send" id="composer-send" aria-label="Send"><svg><use href="#i-arrow-right"/></svg></button>
              </div>
            </div>
          </div>
          <aside class="kb-panel" id="kb-panel" aria-label="Knowledge Bases"></aside>
        </div>
      </section>

      <!-- View 3: Dashboard -->
      <section class="view" id="view-dash">
        <div class="dash" id="dash"></div>
      </section>
    </main>
  </div>

  <!-- Demo controls (presenter aid) -->
  <div class="demo-ctl" id="demo-ctl">
    <button id="ctl-restart" title="Restart demo" aria-label="Restart demo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>
    </button>
    <button id="ctl-skip" title="Skip to dashboard" aria-label="Skip to dashboard">
      <svg><use href="#i-arrow-right"/></svg>
    </button>
  </div>

  <script src="./app.js?v=16"></script>
</body>
</html>
